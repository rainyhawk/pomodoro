name: Pomodoro
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Pomodoro:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources/update-hosts.sh
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Personal use"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.Pomodoro
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        GENERATE_INFOPLIST_FILE: NO
